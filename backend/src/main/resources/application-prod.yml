spring:
  config:
    activate:
      on-profile: prod
  # Sin valores por defecto a propósito: en prod, si falta una variable de
  # entorno el arranque debe fallar en vez de usar un secreto de relleno.
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false

logging:
  level:
    root: INFO
    com.montanaritech: INFO
