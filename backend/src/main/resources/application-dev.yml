spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:montanari_contable}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:montanari}
    password: ${DB_PASSWORD:montanari}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true

app:
  jwt:
    # Default de conveniencia SOLO para dev local sin Docker Compose (que ya
    # trae su propio JWT_SECRET vía .env). Nunca usar este valor en prod.
    secret: ${JWT_SECRET:dev-only-secret-nunca-usar-en-produccion-cambiar-32bytes}

logging:
  level:
    com.montanaritech: DEBUG
    org.hibernate.SQL: DEBUG
